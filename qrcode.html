<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码工具</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .home-link {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px;
      color: #9ca3af; text-decoration: none; flex: none;
      transition: background 0.15s, color 0.15s;
    }
    .home-link:hover { background: #f3f4f6; color: #374151; }
    .header-title { font-size: 14px; font-weight: 600; color: #111; letter-spacing: 0.02em; }
    .header-title span { color: #9ca3af; font-weight: 400; margin: 0 6px; }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
      gap: 1px;
      background: #e5e7eb;
    }

    .pane {
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-header {
      padding: 10px 20px;
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    /* ── 生成：输入区固定，QR 区占满剩余 ── */
    #gen-input {
      height: 110px;
      flex-shrink: 0;
      padding: 16px 20px;
      font-size: 13px;
      font-family: 'JetBrains Mono', 'Menlo', monospace;
      line-height: 1.7;
      color: #374151;
      border: none;
      outline: none;
      resize: none;
      background: #fafafa;
      border-bottom: 1px solid #f0f0f0;
    }
    #gen-input::placeholder { color: #d1d5db; }

    .gen-qr-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px 20px;
    }

    .gen-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #d1d5db;
      font-size: 13px;
    }
    .gen-hint svg { width: 48px; height: 48px; opacity: 0.3; }

    #qr-wrap { display: none; flex-direction: column; align-items: center; gap: 20px; }
    #qr-div { line-height: 0; }
    #qr-div img, #qr-div canvas { border-radius: 10px; display: block; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

    .dl-btn {
      padding: 8px 24px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .dl-btn:hover { background: #222; }

    /* ── 解析：空状态 drop zone 占满，有结果后缩成紧凑条 ── */
    .decode-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      min-height: 0;
    }

    .drop-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px;
      border: 2px dashed #e5e7eb;
      border-radius: 12px;
      color: #9ca3af;
      font-size: 13px;
      cursor: default;
      transition: border-color 0.15s, background 0.15s, flex 0.2s, margin 0.2s, min-height 0.2s;
      min-height: 160px;
    }
    .drop-zone.drag-over { border-color: #6b7280; background: #f9fafb; }

    /* 紧凑模式：有解析结果后 */
    .drop-zone.compact {
      flex: none;
      flex-direction: row;
      min-height: 0;
      height: 48px;
      margin: 12px 20px;
      gap: 10px;
      justify-content: center;
      border-radius: 8px;
      font-size: 12px;
    }
    .drop-zone.compact .drop-icon,
    .drop-zone.compact .drop-hint { display: none; }

    .drop-zone svg { width: 32px; height: 32px; opacity: 0.4; }
    .drop-hint { font-size: 11px; color: #d1d5db; }

    .upload-btn {
      padding: 5px 14px;
      background: none;
      color: #6b7280;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .upload-btn:hover { color: #111; border-color: #9ca3af; }

    .decode-preview {
      margin: 0 20px;
      border-radius: 10px;
      overflow: hidden;
      background: #f5f5f5;
      max-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .decode-preview img { max-width: 100%; max-height: 220px; object-fit: contain; display: block; }

    .decode-result {
      margin: 14px 20px 24px;
      flex-shrink: 0;
    }
    .decode-result-label {
      font-size: 11px; font-weight: 600; color: #9ca3af;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px;
    }
    .decode-result-box {
      position: relative;
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 80px 12px 14px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: #374151;
      line-height: 1.6;
      word-break: break-all;
      min-height: 44px;
    }
    .copy-result-btn {
      position: absolute; top: 8px; right: 8px;
      padding: 4px 12px;
      background: #000; color: #fff;
      border: none; border-radius: 14px;
      font-size: 11px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .copy-result-btn:hover { background: #222; }
    .decode-error { margin-top: 8px; font-size: 12px; color: #dc2626; }
  </style>
</head>

<body>

  <header>
    <a class="home-link" href="index.html" title="工具箱首页">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1.5 6.5L7.5 1.5L13.5 6.5V13.5H9.5V9.5H5.5V13.5H1.5V6.5Z"/>
      </svg>
    </a>
    <div class="header-title">二维码工具 <span>·</span> 生成 & 解析</div>
    <button class="grp-hbtn" style="margin-left:auto" aria-label="加入烁皓 AI 交流群" onclick="grpOpen()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>AI 交流群</span>
    </button>
  </header>

  <div class="main">

    <!-- 左：文本 → 二维码 -->
    <div class="pane">
      <div class="pane-header">文本 → 二维码</div>
      <textarea id="gen-input" placeholder="输入文字、链接、任意内容…"></textarea>
      <div class="gen-qr-area">
        <div class="gen-hint" id="gen-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <path d="M14 14h2v2h-2zm4 0h2v2h-2zm-4 4h2v2h-2zm4 0h2v2h-2z"/>
          </svg>
          <span>输入内容后自动生成</span>
        </div>
        <div id="qr-wrap">
          <div id="qr-div"></div>
          <button class="dl-btn" onclick="downloadQR()">下载 PNG</button>
        </div>
      </div>
    </div>

    <!-- 右：二维码 → 文本 -->
    <div class="pane">
      <div class="pane-header">二维码 → 文本</div>
      <div class="decode-pane">
        <div class="drop-zone" id="drop-zone">
          <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 16M14 8h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <span>拖入图片 · Ctrl+V 粘贴</span>
          <span class="drop-hint">PNG · JPG · GIF · WebP</span>
          <button class="upload-btn" id="upload-btn">点击上传</button>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none">

        <div id="decode-result-wrap" style="display:none">
          <div class="decode-preview"><img id="decode-img" src="" alt=""></div>
          <div class="decode-result">
            <div class="decode-result-label">解析结果</div>
            <div class="decode-result-box">
              <span id="result-text"></span>
              <button class="copy-result-btn" id="copy-result-btn" onclick="copyResult()">复制</button>
            </div>
            <div class="decode-error" id="decode-error" style="display:none"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ── 生成 ──
    const genInput = document.getElementById('gen-input');
    const genHint = document.getElementById('gen-hint');
    const qrWrap = document.getElementById('qr-wrap');
    const qrDiv = document.getElementById('qr-div');
    let qrObj = null;

    genInput.addEventListener('input', () => {
      const text = genInput.value.trim();
      if (!text) {
        genHint.style.display = '';
        qrWrap.style.display = 'none';
        return;
      }
      genHint.style.display = 'none';
      qrWrap.style.display = 'flex';
      if (qrObj) {
        qrObj.clear();
        qrObj.makeCode(text);
      } else {
        qrObj = new QRCode(qrDiv, {
          text,
          width: 240,
          height: 240,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      }
    });

    function downloadQR() {
      const canvas = qrDiv.querySelector('canvas');
      const img = qrDiv.querySelector('img');
      const a = document.createElement('a');
      a.download = 'qrcode.png';
      a.href = canvas ? canvas.toDataURL('image/png') : img.src;
      a.click();
    }

    // ── 解析 ──
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const decodeResultWrap = document.getElementById('decode-result-wrap');
    const decodeImg = document.getElementById('decode-img');
    const resultText = document.getElementById('result-text');
    const decodeError = document.getElementById('decode-error');

    document.getElementById('upload-btn').addEventListener('click', e => {
      e.stopPropagation();
      fileInput.click();
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) decodeFile(fileInput.files[0]);
    });

    function decodeFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => decodeImageSrc(e.target.result);
      reader.readAsDataURL(file);
    }

    function decodeImageSrc(src) {
      decodeImg.src = src;
      decodeResultWrap.style.display = '';
      decodeError.style.display = 'none';
      resultText.textContent = '解析中…';
      // 切换 drop zone 为紧凑条
      dropZone.classList.add('compact');

      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          resultText.textContent = code.data;
          decodeError.style.display = 'none';
        } else {
          resultText.textContent = '';
          decodeError.style.display = '';
          decodeError.textContent = '未能识别二维码，请确认图片清晰且包含完整二维码';
        }
      };
      img.src = src;
    }

    // 拖拽
    document.addEventListener('dragover', e => e.preventDefault());
    dropZone.addEventListener('dragenter', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', e => {
      if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) decodeFile(e.dataTransfer.files[0]);
    });

    // 粘贴
    document.addEventListener('paste', e => {
      const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
      if (item) decodeFile(item.getAsFile());
    });

    async function copyResult() {
      const text = resultText.textContent;
      if (!text || text === '解析中…') return;
      await navigator.clipboard.writeText(text);
      const btn = document.getElementById('copy-result-btn');
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = '复制', 1500);
    }
  </script>

  <!-- ── AI 交流群入口（各工具页统一注入） ── -->
  <style>
    .grp-hbtn {
      position: relative; overflow: hidden;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px;
      background: linear-gradient(135deg, #ff8a00, #ff5a1f); color: #fff; border: none;
      font-size: 12px; font-weight: 700; line-height: 1; cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(255,90,31,0.35);
      transition: transform 0.12s, box-shadow 0.15s, filter 0.15s;
    }
    .grp-hbtn > svg, .grp-hbtn > span { position: relative; z-index: 1; }
    .grp-hbtn::after {
      content: ""; position: absolute; top: 0; left: 0; width: 55%; height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,0.65), transparent);
      transform: translateX(-200%) skewX(-20deg);
      animation: grp-shine 3.2s ease-in-out infinite;
      z-index: 2; pointer-events: none;
    }
    @keyframes grp-shine {
      0% { transform: translateX(-200%) skewX(-20deg); }
      55%, 100% { transform: translateX(360%) skewX(-20deg); }
    }
    .grp-hbtn:hover { filter: brightness(1.08); box-shadow: 0 6px 16px rgba(255,90,31,0.5); transform: translateY(-1px) scale(1.03); }
    .grp-hbtn:hover::after { animation-duration: 1.1s; }
    .grp-hbtn:active { transform: translateY(0) scale(1); }
    .grp-hbtn svg { width: 14px; height: 14px; flex-shrink: 0; }
    @media (prefers-reduced-motion: reduce) { .grp-hbtn::after { animation: none; opacity: 0; } }

    .grp-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: none; align-items: center; justify-content: center;
      background: rgba(15,23,42,0.55); backdrop-filter: blur(2px);
      padding: 20px;
    }
    .grp-overlay.open { display: flex; }

    .grp-modal {
      position: relative; width: 100%; max-width: 430px;
      background: linear-gradient(180deg, #fffdf8, #ffffff);
      border: 1.5px solid #f3e8d2; border-radius: 20px;
      padding: 32px 28px 28px;
      box-shadow: 0 24px 60px rgba(15,23,42,0.25);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      animation: grp-pop 0.18s ease-out;
    }
    @keyframes grp-pop { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }

    .grp-close {
      position: absolute; top: 14px; right: 14px;
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border: none; border-radius: 8px; background: transparent; color: #9ca3af; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .grp-close:hover { background: #f3f4f6; color: #111; }

    .grp-title { font-size: 22px; color: #111; margin-bottom: 10px; }
    .grp-desc { font-size: 13.5px; color: #6b7280; line-height: 1.85; margin-bottom: 22px; }
    .grp-desc strong { color: #111; }

    .grp-qr {
      text-align: center;
    }
    .grp-wx {
      font: inherit; font-weight: 700; color: #111;
      background: none; border: none; padding: 0 1px; margin: 0; cursor: pointer;
      border-bottom: 1px dashed #9aa0a6;
      transition: color 0.15s, border-color 0.15s;
    }
    .grp-wx:hover { color: #d1490b; border-bottom-color: #d1490b; }

    .grp-toast {
      position: fixed; left: 50%; top: 24px;
      transform: translateX(-50%) translateY(-12px);
      z-index: 10000; pointer-events: none;
      display: inline-flex; align-items: center; gap: 6px;
      background: #16a34a; color: #fff;
      font-size: 13px; font-weight: 600;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 10px 18px; border-radius: 999px;
      box-shadow: 0 8px 24px rgba(22,163,74,0.35);
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
    }
    .grp-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .grp-toast.error { background: #dc2626; box-shadow: 0 8px 24px rgba(220,38,38,0.35); }
    .grp-qr img {
      width: 100%; max-width: 220px; border-radius: 12px; display: block; margin: 0 auto;
      box-shadow: 0 10px 24px rgba(15,23,42,0.08);
    }
  </style>

  <div class="grp-overlay" id="grp-overlay" onclick="grpBackdrop(event)">
    <div class="grp-modal" role="dialog" aria-modal="true" aria-label="烁皓 AI 交流群">
      <button class="grp-close" aria-label="关闭" onclick="grpClose()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <h2 class="grp-title">烁皓 AI 交流群</h2>
      <p class="grp-desc">我是烁皓，一个天天用 AI 做产品、搞钱的独立开发者，建了一个「付费 AI 交流群」。<br>💰 入群早鸟价 ￥9.9，群每满 10 人涨 10 元：9.9 → 19.9 → 29.9…… 封顶 99，越早进越便宜。<br>想进的 👉 加我微信 <button class="grp-wx" type="button" onclick="grpCopyWx()" title="点击复制 hao_dev">hao_dev</button>（备注「入群」），我拉你进群。</p>
      <div class="grp-qr">
        <img src="images/wechat-qr.png" alt="烁皓微信二维码">
      </div>
    </div>
  </div>

  <div class="grp-toast" id="grp-toast">复制成功 ✓</div>

  <script>
    function grpOpen() { document.getElementById('grp-overlay').classList.add('open'); }
    function grpClose() { document.getElementById('grp-overlay').classList.remove('open'); }
    function grpBackdrop(e) { if (e.target === e.currentTarget) grpClose(); }
    function grpCopyWx() {
      const done = () => grpToast('复制成功 ✓');
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText('hao_dev').then(done).catch(() => grpFallbackCopy('hao_dev', done));
      } else { grpFallbackCopy('hao_dev', done); }
    }
    function grpToast(msg, type) {
      const t = document.getElementById('grp-toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.toggle('error', type === 'error');
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), type === 'error' ? 2600 : 1600);
    }
    function grpFallbackCopy(text, cb) {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); cb(); } catch (_) {}
      document.body.removeChild(ta);
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') grpClose(); });
  </script>

</body>
</html>
